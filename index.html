<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🏮 Dragon Palace — Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --or: #c9a84c;
  --or2: #e8c97a;
  --bg: #080808;
  --bg2: #111;
  --bg3: #181818;
  --border: rgba(201,168,76,0.15);
  --text: #f0e6c8;
  --muted: rgba(240,230,200,0.45);
  --green: #27ae60;
  --orange: #e67e22;
  --blue: #3498db;
  --red: #e74c3c;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
a { color:inherit; text-decoration:none; }

/* LOGIN */
#page-login { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.login-box { width:100%; max-width:320px; text-align:center; }
.login-icon { font-size:60px; margin-bottom:16px; filter:drop-shadow(0 0 20px rgba(201,168,76,0.4)); }
.login-titre { font-family:'Playfair Display',serif; font-size:28px; font-weight:900; color:var(--or); margin-bottom:6px; }
.login-sous { font-size:13px; color:var(--muted); margin-bottom:28px; }
.login-input { width:100%; padding:14px; border-radius:12px; border:1.5px solid var(--border); background:var(--bg2); color:var(--text); font-size:16px; font-family:inherit; text-align:center; outline:none; margin-bottom:12px; transition:border-color 0.2s; }
.login-input:focus { border-color:var(--or); }
.login-err { color:var(--red); font-size:13px; margin-bottom:10px; display:none; }

/* HEADER */
#header { position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(8,8,8,0.97); border-bottom:1px solid var(--border); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; max-width:480px; margin:0 auto; }
.h-logo { font-family:'Playfair Display',serif; font-size:16px; font-weight:900; color:var(--or); }
.h-logout { font-size:12px; color:var(--muted); background:none; border:none; cursor:pointer; font-family:inherit; }

/* TABS */
#tabs { position:fixed; bottom:0; left:0; right:0; z-index:100; background:rgba(8,8,8,0.97); border-top:1px solid var(--border); display:flex; max-width:480px; margin:0 auto; }
.tab { flex:1; padding:10px 4px 8px; border:none; background:transparent; color:var(--muted); font-size:10px; font-weight:700; cursor:pointer; font-family:inherit; display:flex; flex-direction:column; align-items:center; gap:3px; transition:color 0.15s; }
.tab-icon { font-size:20px; }
.tab.on { color:var(--or); }
.tab.on .tab-icon { filter:drop-shadow(0 0 6px rgba(201,168,76,0.5)); }

/* PAGES */
.page { display:none; max-width:480px; margin:0 auto; padding:70px 16px 80px; }
.page.on { display:block; }

/* SECTION TITRE */
.s-titre { font-family:'Playfair Display',serif; font-size:20px; font-weight:900; color:var(--or); margin-bottom:16px; }

/* KPI GRID */
.kg { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
.k { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:14px; text-align:center; }
.k.full { grid-column:span 2; }
.kv { font-size:22px; font-weight:900; color:var(--or); line-height:1; margin-bottom:4px; }
.kl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; }

/* CARDS */
.card { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:13px; margin-bottom:8px; }
.crow { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.cid { font-size:14px; font-weight:900; color:var(--or); }
.cnom { flex:1; font-size:14px; font-weight:700; }
.cbdg { font-size:10px; font-weight:700; border:1px solid; border-radius:5px; padding:2px 7px; }
.cmeta { font-size:11px; color:var(--muted); margin-bottom:5px; }
.carts { font-size:12px; color:rgba(240,230,200,0.6); line-height:1.5; margin-bottom:7px; }

/* FORM */
.fc { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:14px; }
.ft { font-size:14px; font-weight:800; color:var(--or); margin-bottom:12px; }
.fl { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; display:block; margin-bottom:3px; margin-top:6px; }
.fi { width:100%; padding:9px 11px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:13px; font-family:inherit; outline:none; }
.fi:focus { border-color:var(--or); }
select.fi { cursor:pointer; }

/* BUTTONS */
.btn { display:block; width:100%; padding:12px; border-radius:10px; border:none; background:linear-gradient(135deg,var(--or),var(--or2)); color:var(--bg); font-size:14px; font-weight:800; cursor:pointer; font-family:inherit; margin-top:10px; }
.btn2 { background:transparent; border:1px solid var(--or); color:var(--or); margin-bottom:8px; }
.abtn { display:inline-block; padding:6px 12px; border-radius:7px; border:1px solid; font-size:11px; font-weight:700; background:transparent; cursor:pointer; margin-top:4px; }
.empty { text-align:center; color:rgba(240,230,200,0.2); font-size:14px; padding:32px 0; }
.msg-ok { background:rgba(39,174,96,0.1); border:1px solid rgba(39,174,96,0.3); border-radius:8px; padding:10px 12px; color:var(--green); font-size:13px; font-weight:700; margin-bottom:12px; display:none; }
.sep { height:1px; background:var(--border); margin:12px 0; }
.cat-label { font-size:11px; font-weight:800; color:var(--or); text-transform:uppercase; letter-spacing:0.07em; padding:8px 10px; background:rgba(201,168,76,0.07); border-radius:7px; border-left:3px solid var(--or); margin:12px 0 8px; }

/* ANIM */
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.page.on { animation:fadeIn 0.2s ease; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="page-login">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <div class="login-titre">Manager</div>
    <div class="login-sous">Dragon Palace</div>
    <div class="login-err" id="login-err">Mot de passe incorrect</div>
    <input class="login-input" id="login-pwd" type="password" placeholder="Mot de passe" />
    <button class="btn" onclick="login()">Entrer →</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div id="header" style="display:none">
    <div class="h-logo">🏮 Dragon Palace</div>
    <button class="h-logout" onclick="logout()">Déconnexion</button>
  </div>

  <!-- PAGE DASHBOARD -->
  <div class="page" id="p-dashboard">
    <div class="s-titre">📊 Dashboard</div>
    <div class="kg" id="kg-dashboard"></div>
    <button class="btn btn2" onclick="showPage('commandes')">🧾 Voir les commandes</button>
    <button class="btn btn2" onclick="showPage('plats')">🍜 Gérer les plats</button>
  </div>

  <!-- PAGE COMMANDES -->
  <div class="page" id="p-commandes">
    <div class="s-titre">🧾 Commandes</div>
    <div class="msg-ok" id="msg-cmd">✅ Commande ajoutée !</div>
    <div class="fc">
      <div class="ft">+ Nouvelle commande</div>
      <label class="fl">Client</label>
      <input class="fi" id="cmd-client" type="text" placeholder="Prénom du client" />
      <label class="fl">Articles</label>
      <input class="fi" id="cmd-articles" type="text" placeholder="Nems x2, Poulet x1..." />
      <label class="fl">Total (€)</label>
      <input class="fi" id="cmd-total" type="number" step="0.01" placeholder="24.50" />
      <button class="btn" onclick="addCommande()">Ajouter</button>
    </div>
    <div id="liste-commandes"></div>
  </div>

  <!-- PAGE PLATS -->
  <div class="page" id="p-plats">
    <div class="s-titre">🍜 Plats</div>
    <div class="msg-ok" id="msg-plat">✅ Plat ajouté !</div>
    <div class="fc">
      <div class="ft">+ Ajouter un plat</div>
      <label class="fl">Catégorie</label>
      <select class="fi" id="plat-cat">
        <option>Entrées</option><option>Poulet</option><option>Boeuf</option>
        <option>Porc</option><option>Mer</option><option>Végé</option>
        <option>Riz</option><option>Desserts</option><option>Boissons</option>
      </select>
      <label class="fl">Nom</label>
      <input class="fi" id="plat-nom" type="text" placeholder="Ex: Boeuf sechuan" />
      <label class="fl">Prix (€)</label>
      <input class="fi" id="plat-prix" type="number" step="0.01" placeholder="12.50" />
      <label class="fl">Description</label>
      <input class="fi" id="plat-desc" type="text" placeholder="Wok sauce sechuan" />
      <button class="btn" onclick="addPlat()">Ajouter le plat</button>
    </div>
    <div id="liste-plats"></div>
  </div>

  <!-- PAGE SALARIES -->
  <div class="page" id="p-salaries">
    <div class="s-titre">👥 Équipe</div>
    <div class="msg-ok" id="msg-sal">✅ Salarié ajouté !</div>
    <div class="fc">
      <div class="ft">+ Ajouter un salarié</div>
      <label class="fl">Nom complet</label>
      <input class="fi" id="sal-nom" type="text" placeholder="Jean Dupont" />
      <label class="fl">Poste</label>
      <select class="fi" id="sal-poste">
        <option>Cuisinier</option><option>Serveur</option><option>Caissier</option>
        <option>Manager</option><option>Livreur</option><option>Plongeur</option>
      </select>
      <label class="fl">Téléphone</label>
      <input class="fi" id="sal-tel" type="text" placeholder="06 12 34 56 78" />
      <label class="fl">Salaire mensuel (€)</label>
      <input class="fi" id="sal-salaire" type="number" placeholder="1800" />
      <button class="btn" onclick="addSalarie()">Ajouter</button>
    </div>
    <div id="liste-salaries"></div>
  </div>

  <!-- PAGE FOURNISSEURS -->
  <div class="page" id="p-fournisseurs">
    <div class="s-titre">🚚 Fournisseurs</div>
    <div class="msg-ok" id="msg-fou">✅ Fournisseur ajouté !</div>
    <div class="fc">
      <div class="ft">+ Ajouter un fournisseur</div>
      <label class="fl">Nom société</label>
      <input class="fi" id="fou-nom" type="text" placeholder="Metro Cash and Carry" />
      <label class="fl">Contact</label>
      <input class="fi" id="fou-contact" type="text" placeholder="M. Martin" />
      <label class="fl">Téléphone</label>
      <input class="fi" id="fou-tel" type="text" placeholder="04 72 00 00 00" />
      <label class="fl">Produits fournis</label>
      <input class="fi" id="fou-produits" type="text" placeholder="Viandes légumes épicerie" />
      <button class="btn" onclick="addFournisseur()">Ajouter</button>
    </div>
    <div id="liste-fournisseurs"></div>
  </div>

  <!-- TABS -->
  <div id="tabs">
    <button class="tab on" id="tab-dashboard" onclick="showPage('dashboard')">
      <span class="tab-icon">📊</span>Stats
    </button>
    <button class="tab" id="tab-commandes" onclick="showPage('commandes')">
      <span class="tab-icon">🧾</span>Cmdes
    </button>
    <button class="tab" id="tab-plats" onclick="showPage('plats')">
      <span class="tab-icon">🍜</span>Plats
    </button>
    <button class="tab" id="tab-salaries" onclick="showPage('salaries')">
      <span class="tab-icon">👥</span>Equipe
    </button>
    <button class="tab" id="tab-fournisseurs" onclick="showPage('fournisseurs')">
      <span class="tab-icon">🚚</span>Fourn
    </button>
  </div>
</div>

<script>
var PWD = "resto2026";
var DB = {
  commandes: [],
  plats: [],
  salaries: [],
  fournisseurs: []
};

// ── STORAGE ──
function save() {
  try { localStorage.setItem("dp_manager", JSON.stringify(DB)); } catch(e) {}
}
function load() {
  try {
    var d = localStorage.getItem("dp_manager");
    if (d) DB = JSON.parse(d);
  } catch(e) {}
}
function genId() {
  return String(Math.floor(Math.random() * 9000) + 1000);
}
function now() {
  return new Date().toLocaleTimeString("fr-FR", {hour:"2-digit",minute:"2-digit"});
}
function today() {
  return new Date().toLocaleDateString("fr-FR");
}

// ── LOGIN ──
function login() {
  var pwd = document.getElementById("login-pwd").value;
  if (pwd === PWD) {
    load();
    document.getElementById("page-login").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("header").style.display = "flex";
    showPage("dashboard");
  } else {
    document.getElementById("login-err").style.display = "block";
  }
}
function logout() {
  document.getElementById("page-login").style.display = "flex";
  document.getElementById("app").style.display = "none";
  document.getElementById("login-pwd").value = "";
  document.getElementById("login-err").style.display = "none";
}
document.getElementById("login-pwd").addEventListener("keydown", function(e) {
  if (e.key === "Enter") login();
});

// ── NAVIGATION ──
function showPage(name) {
  document.querySelectorAll(".page").forEach(function(p) { p.classList.remove("on"); });
  document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("on"); });
  document.getElementById("p-" + name).classList.add("on");
  document.getElementById("tab-" + name).classList.add("on");
  render(name);
}

// ── RENDER ──
function render(name) {
  if (name === "dashboard")    renderDashboard();
  if (name === "commandes")    renderCommandes();
  if (name === "plats")        renderPlats();
  if (name === "salaries")     renderSalaries();
  if (name === "fournisseurs") renderFournisseurs();
}

// ── DASHBOARD ──
function renderDashboard() {
  var cmds = DB.commandes;
  var ca = 0; var nbLiv = 0;
  cmds.forEach(function(c) { if (c.statut === "Livre") { ca += parseFloat(c.total) || 0; nbLiv++; } });
  var moy = nbLiv > 0 ? ca / nbLiv : 0;
  var nbSal = DB.salaries.length;
  var nbFou = DB.fournisseurs.length;
  var nbEnCours = cmds.filter(function(c) { return c.statut !== "Livre"; }).length;

  var h = "";
  h += "<div class='k full'><div class='kv'>" + ca.toFixed(2) + " \u20ac</div><div class='kl'>Chiffre d affaires</div></div>";
  h += "<div class='k'><div class='kv'>" + cmds.length + "</div><div class='kl'>Commandes</div></div>";
  h += "<div class='k'><div class='kv' style='color:var(--green)'>" + nbLiv + "</div><div class='kl'>Livrees</div></div>";
  h += "<div class='k'><div class='kv' style='color:var(--orange)'>" + nbEnCours + "</div><div class='kl'>En cours</div></div>";
  h += "<div class='k'><div class='kv' style='color:var(--blue)'>" + moy.toFixed(2) + " \u20ac</div><div class='kl'>Panier moyen</div></div>";
  h += "<div class='k'><div class='kv'>" + nbSal + "</div><div class='kl'>Salaries</div></div>";
  h += "<div class='k'><div class='kv'>" + nbFou + "</div><div class='kl'>Fournisseurs</div></div>";
  h += "<div class='k'><div class='kv'>" + DB.plats.length + "</div><div class='kl'>Plats ajoutes</div></div>";
  document.getElementById("kg-dashboard").innerHTML = h;
}

// ── COMMANDES ──
function addCommande() {
  var client = document.getElementById("cmd-client").value.trim();
  var articles = document.getElementById("cmd-articles").value.trim();
  var total = parseFloat(document.getElementById("cmd-total").value) || 0;
  if (!client) return;
  DB.commandes.unshift({ id:genId(), client:client, articles:articles, total:total, statut:"En attente", heure:now(), date:today() });
  save();
  document.getElementById("cmd-client").value = "";
  document.getElementById("cmd-articles").value = "";
  document.getElementById("cmd-total").value = "";
  showMsg("msg-cmd");
  renderCommandes();
}

function majStatut(id, ns) {
  DB.commandes.forEach(function(c) { if (c.id === id) c.statut = ns; });
  save();
  renderCommandes();
}

function renderCommandes() {
  var cmds = DB.commandes;
  if (cmds.length === 0) { document.getElementById("liste-commandes").innerHTML = "<div class='empty'>Aucune commande</div>"; return; }
  var h = "";
  cmds.forEach(function(cmd) {
    var col = cmd.statut === "En attente" ? "var(--orange)" : cmd.statut === "En preparation" ? "var(--blue)" : cmd.statut === "Pret" ? "var(--green)" : "rgba(240,230,200,0.2)";
    h += "<div class='card'><div class='crow'><div class='cid'>N" + cmd.id + "</div><div class='cnom'>" + cmd.client + "</div><div class='cbdg' style='color:" + col + ";border-color:" + col + "'>" + cmd.statut + "</div></div>";
    h += "<div class='cmeta'>" + cmd.heure + " \u00b7 " + parseFloat(cmd.total).toFixed(2) + " \u20ac</div>";
    if (cmd.articles) h += "<div class='carts'>" + cmd.articles + "</div>";
    if (cmd.statut !== "Livre") {
      var ns = cmd.statut === "En attente" ? "En preparation" : cmd.statut === "En preparation" ? "Pret" : "Livre";
      var bl = cmd.statut === "En attente" ? "Demarrer" : cmd.statut === "En preparation" ? "Pret !" : "Livre";
      h += "<button class='abtn' style='color:" + col + ";border-color:" + col + "' onclick=\"majStatut('" + cmd.id + "','" + ns + "')\">▶ " + bl + "</button>";
    }
    h += "</div>";
  });
  document.getElementById("liste-commandes").innerHTML = h;
}

// ── PLATS ──
function addPlat() {
  var nom = document.getElementById("plat-nom").value.trim();
  var prix = parseFloat(document.getElementById("plat-prix").value) || 0;
  var cat = document.getElementById("plat-cat").value;
  var desc = document.getElementById("plat-desc").value.trim();
  if (!nom) return;
  DB.plats.push({ id:genId(), cat:cat, nom:nom, prix:prix, desc:desc });
  save();
  document.getElementById("plat-nom").value = "";
  document.getElementById("plat-prix").value = "";
  document.getElementById("plat-desc").value = "";
  showMsg("msg-plat");
  renderPlats();
}

function renderPlats() {
  var plats = DB.plats;
  if (plats.length === 0) { document.getElementById("liste-plats").innerHTML = "<div class='empty'>Aucun plat ajouté</div>"; return; }
  var cats = {};
  plats.forEach(function(p) {
    if (!cats[p.cat]) cats[p.cat] = [];
    cats[p.cat].push(p);
  });
  var h = "";
  Object.keys(cats).forEach(function(cat) {
    h += "<div class='cat-label'>" + cat + "</div>";
    cats[cat].forEach(function(p) {
      h += "<div class='card'><div class='crow'><div style='flex:1;font-size:13px;font-weight:700'>" + p.nom + "</div><div style='font-size:14px;font-weight:900;color:var(--or)'>" + p.prix.toFixed(2) + " \u20ac</div></div>";
      if (p.desc) h += "<div style='font-size:11px;color:var(--muted)'>" + p.desc + "</div>";
      h += "</div>";
    });
  });
  document.getElementById("liste-plats").innerHTML = h;
}

// ── SALARIES ──
function addSalarie() {
  var nom = document.getElementById("sal-nom").value.trim();
  var poste = document.getElementById("sal-poste").value;
  var tel = document.getElementById("sal-tel").value.trim();
  var salaire = parseFloat(document.getElementById("sal-salaire").value) || 0;
  if (!nom) return;
  DB.salaries.push({ id:genId(), nom:nom, poste:poste, tel:tel, salaire:salaire });
  save();
  document.getElementById("sal-nom").value = "";
  document.getElementById("sal-tel").value = "";
  document.getElementById("sal-salaire").value = "";
  showMsg("msg-sal");
  renderSalaries();
}

function renderSalaries() {
  var sals = DB.salaries;
  if (sals.length === 0) { document.getElementById("liste-salaries").innerHTML = "<div class='empty'>Aucun salarié</div>"; return; }
  var h = "<div style='font-size:11px;font-weight:700;color:var(--or);margin-bottom:8px;text-transform:uppercase'>Equipe (" + sals.length + " personnes)</div>";
  sals.forEach(function(s) {
    h += "<div class='card'><div class='crow'><div style='flex:1;font-size:14px;font-weight:700'>" + s.nom + "</div><div class='cbdg' style='color:var(--or);border-color:rgba(201,168,76,0.3)'>" + s.poste + "</div></div>";
    h += "<div style='font-size:11px;color:var(--muted)'>" + (s.tel||"") + " \u00b7 " + s.salaire.toFixed(0) + " \u20ac/mois</div></div>";
  });
  document.getElementById("liste-salaries").innerHTML = h;
}

// ── FOURNISSEURS ──
function addFournisseur() {
  var nom = document.getElementById("fou-nom").value.trim();
  var contact = document.getElementById("fou-contact").value.trim();
  var tel = document.getElementById("fou-tel").value.trim();
  var produits = document.getElementById("fou-produits").value.trim();
  if (!nom) return;
  DB.fournisseurs.push({ id:genId(), nom:nom, contact:contact, tel:tel, produits:produits });
  save();
  document.getElementById("fou-nom").value = "";
  document.getElementById("fou-contact").value = "";
  document.getElementById("fou-tel").value = "";
  document.getElementById("fou-produits").value = "";
  showMsg("msg-fou");
  renderFournisseurs();
}

function renderFournisseurs() {
  var fous = DB.fournisseurs;
  if (fous.length === 0) { document.getElementById("liste-fournisseurs").innerHTML = "<div class='empty'>Aucun fournisseur</div>"; return; }
  var h = "<div style='font-size:11px;font-weight:700;color:var(--or);margin-bottom:8px;text-transform:uppercase'>Fournisseurs (" + fous.length + ")</div>";
  fous.forEach(function(f) {
    h += "<div class='card'><div style='font-size:14px;font-weight:700;margin-bottom:4px'>" + f.nom + "</div>";
    if (f.contact || f.tel) h += "<div style='font-size:11px;color:var(--muted)'>" + (f.contact||"") + " \u00b7 " + (f.tel||"") + "</div>";
    if (f.produits) h += "<div style='font-size:12px;color:var(--or);margin-top:4px'>" + f.produits + "</div>";
    h += "</div>";
  });
  document.getElementById("liste-fournisseurs").innerHTML = h;
}

// ── UTIL ──
function showMsg(id) {
  var el = document.getElementById(id);
  el.style.display = "block";
  setTimeout(function() { el.style.display = "none"; }, 2500);
}

// Init
load();
</script>
